<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#a)" />
  <circle cx="680" cy="90" r="120" fill="#533afd" opacity="0.08" />
  <circle cx="120" cy="360" r="90" fill="#ef4444" opacity="0.08" />

  <g transform="translate(160,120)">
    <!-- safe bowl -->
    <ellipse cx="80" cy="160" rx="70" ry="22" fill="#e2e8f0" />
    <path d="M20,90 Q80,180 140,90 L140,80 Q80,170 20,80 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" />
    <ellipse cx="80" cy="80" rx="60" ry="18" fill="#dcfce7" stroke="#22c55e" stroke-width="3" />
    <text x="80" y="88" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" fill="#15803d" font-weight="500">SAFE</text>

    <!-- toxic skull -->
    <circle cx="260" cy="95" r="55" fill="#fee2e2" stroke="#ef4444" stroke-width="4" />
    <circle cx="240" cy="90" r="8" fill="#991b1b" />
    <circle cx="280" cy="90" r="8" fill="#991b1b" />
    <path d="M250,115 Q260,125 270,115" fill="none" stroke="#991b1b" stroke-width="4" stroke-linecap="round" />
    <rect x="255" y="125" width="10" height="14" rx="2" fill="#991b1b" />

    <!-- title -->
    <text x="170" y="230" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="26" fill="#0f172a" font-weight="500">Top 10 Toxic Foods for Pets</text>
  </g>
</svg>
