<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <circle cx="680" cy="90" r="120" fill="#533afd" opacity="0.08" />
  <circle cx="120" cy="360" r="90" fill="#ef4444" opacity="0.08" />

  <g transform="translate(180,100)">
    <!-- first aid kit -->
    <rect x="60" y="60" width="220" height="160" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
    <rect x="130" y="40" width="80" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
    <rect x="150" y="110" width="40" height="120" fill="#dcfce7" />
    <rect x="100" y="140" width="140" height="40" fill="#dcfce7" />
    <rect x="165" y="85" width="10" height="150" fill="#22c55e" />
    <rect x="100" y="155" width="140" height="10" fill="#22c55e" />

    <!-- phone -->
    <rect x="320" y="80" width="90" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" />
    <rect x="332" y="95" width="66" height="100" rx="4" fill="#f1f5f9" />
    <circle cx="365" cy="215" r="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
    <text x="365" y="150" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" fill="#533afd" font-weight="600">24/7</text>

    <!-- title -->
    <text x="215" y="290" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="24" fill="#0f172a" font-weight="500">Pet Emergency First Aid</text>
  </g>
</svg>
