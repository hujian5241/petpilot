name: Fetch monthly pet poisoning news drafts

on:
  schedule:
    # Run at 09:00 UTC on the 1st of every month.
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch news drafts
        run: npx tsx scripts/fetch-news.ts

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/news-drafts-${{ github.run_id }}
          title: "News drafts for ${{ env.MONTH }}"
          body: |
            This PR contains automatically fetched pet poisoning incident summaries from authoritative sources.

            - Generated by: `scripts/fetch-news.ts`
            - Sources: ASPCA, Pet Poison Helpline, FDA CVM, AVMA
            - Each draft is a summary with a link to the original source.
            - **Please review for accuracy, relevance, and copyright compliance before merging.**

            Do not publish without editorial approval.
          commit-message: "chore: add news drafts for ${{ env.MONTH }}"
          add-paths: |
            content/news/en/drafts/*.md
        env:
          MONTH: ${{ github.event.schedule && format('{0}-{1}', github.event.schedule.year, github.event.schedule.month) || format('{0}-{1}', github.run_year, github.run_month) }}
